services:

  lakehouse-mapping-tool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lakehouse-mapping-tool
    ports:
      - "8501:8501"
    volumes:
      - metadata:/app/metadata
      - imports:/app/imports
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/lakehouse
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: lakehouse-postgres
    environment:
      POSTGRES_DB: lakehouse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  metadata:
  imports:
  postgres_data:
